<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0a0e1a">
  <meta name="description" content="Chaminda Drop - Fast, secure peer-to-peer file sharing">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Chaminda Drop</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/svg+xml" href="icons/icon-192.svg">
  <link rel="apple-touch-icon" href="icons/icon-192.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/theme.css">
  <link rel="stylesheet" href="css/main.css">
</head>
<body>
  <canvas id="particles"></canvas>

  <div class="container">
    <header class="hero-section">
      <div id="hero" class="hero-svg-container"></div>
      <h1 class="hero-title gradient-text">Chaminda Drop</h1>
      <p class="hero-subtitle">Fast, secure peer-to-peer file sharing</p>
    </header>

    <section class="device-section glass-card animate-in">
      <div class="device-header">
        <span class="status-dot"></span>
        <span class="device-label">Your Device</span>
      </div>
      <div class="device-name-row">
        <span id="deviceName" class="device-name">Detecting...</span>
        <button id="editNameBtn" class="btn-icon" title="Rename">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
            <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
          </svg>
        </button>
      </div>
      <span id="devicePlatform" class="device-platform"></span>
    </section>

    <section class="room-section glass-card animate-in">
      <div id="roomActions" class="room-actions">
        <button id="createRoomBtn" class="btn-primary">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/>
          </svg>
          Create Room
        </button>
        <div class="join-group">
          <input id="roomCodeInput" type="text" class="room-input glass-card" placeholder="Room code" maxlength="6" autocomplete="off" spellcheck="false">
          <button id="joinRoomBtn" class="btn-secondary">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/>
            </svg>
            Join
          </button>
        </div>
      </div>
      <div id="roomInfo" class="room-info hidden">
        <span class="room-label">Room Code</span>
        <div class="room-code-row">
          <span id="roomCode" class="room-code gradient-text"></span>
          <button id="copyCodeBtn" class="btn-icon" title="Copy code">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
            </svg>
          </button>
          <button id="qrBtn" class="btn-icon" title="Show QR code">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="2" y="2" width="8" height="8" rx="1"/><rect x="14" y="2" width="8" height="8" rx="1"/><rect x="2" y="14" width="8" height="8" rx="1"/><rect x="14" y="14" width="4" height="4"/>
            </svg>
          </button>
          <button id="leaveRoomBtn" class="btn-icon btn-danger" title="Leave room">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/>
            </svg>
          </button>
        </div>
      </div>
    </section>

    <section id="peersSection" class="peers-section hidden">
      <h2 class="section-title">Connected Devices</h2>
      <div id="peersGrid" class="peers-grid"></div>
    </section>

    <div id="dropZone" class="drop-zone">
      <div class="drop-zone-content">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/>
        </svg>
        <p>Drop files here to share</p>
      </div>
    </div>

    <section id="transferPanel" class="transfer-panel hidden">
      <div class="transfer-header">
        <span>Transfers</span>
        <button id="closeTransfersBtn" class="btn-icon">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <div id="transferList" class="transfer-list"></div>
    </section>
  </div>

  <div id="transferModal" class="modal-overlay hidden">
    <div class="modal glass-card">
      <h3 class="modal-title">Incoming Transfer</h3>
      <p id="transferFrom" class="modal-subtitle"></p>
      <div id="transferFiles" class="modal-file-list"></div>
      <p id="transferSize" class="modal-total"></p>
      <div class="modal-actions">
        <button id="rejectBtn" class="btn-secondary">Reject</button>
        <button id="acceptBtn" class="btn-primary">Accept</button>
      </div>
    </div>
  </div>

  <div id="renameModal" class="modal-overlay hidden">
    <div class="modal glass-card">
      <h3 class="modal-title">Rename Device</h3>
      <input id="renameInput" type="text" class="modal-input glass-card" placeholder="Enter name" maxlength="24" autocomplete="off">
      <div class="modal-actions">
        <button id="renameCancelBtn" class="btn-secondary">Cancel</button>
        <button id="renameSaveBtn" class="btn-primary">Save</button>
      </div>
    </div>
  </div>

  <div id="qrModal" class="modal-overlay hidden">
    <div class="modal glass-card">
      <h3 class="modal-title">Scan to Join</h3>
      <canvas id="qrCanvas" width="220" height="220"></canvas>
      <p id="qrText" class="qr-code-text gradient-text"></p>
      <button id="closeQRBtn" class="btn-secondary" style="margin-top:12px">Close</button>
    </div>
  </div>

  <div id="toastContainer"></div>

  <input id="fileInput" type="file" multiple hidden>

  <script>
    if (location.hostname === 'localhost' || location.hostname === '127.0.0.1') {
      window.WS_SERVER = 'wss://file-sharing-backend-4jlt.onrender.com';
    }
  </script>
  <script src="js/device.js"></script>
  <script src="js/particles.js"></script>
  <script src="js/hero.js"></script>
  <script src="js/signaling.js"></script>
  <script src="js/webrtc.js"></script>
  <script src="js/transfer.js"></script>
  <script src="js/qr.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
