<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0a0e1a">
  <meta name="description" content="Chaminda Drop - Fast, secure peer-to-peer file sharing">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Chaminda Drop</title>
  <link rel="manifest" href="/manifest.json">
  <link rel="icon" type="image/svg+xml" href="/icons/icon-192.svg">
  <link rel="apple-touch-icon" href="/icons/icon-192.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/theme.css">
  <link rel="stylesheet" href="/css/main.css">
</head>
<body>
  <canvas id="particles"></canvas>

  <div class="container">
    <header class="hero-section">
      <div id="hero" class="hero-svg-container">
        <svg class="hero-illustration" viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <linearGradient id="heroGrad1" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="#06d6a0" stop-opacity="0.6"/>
              <stop offset="100%" stop-color="#7b61ff" stop-opacity="0.6"/>
            </linearGradient>
            <linearGradient id="heroGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="#7b61ff" stop-opacity="0.5"/>
              <stop offset="100%" stop-color="#ff6b9d" stop-opacity="0.5"/>
            </linearGradient>
            <filter id="heroGlow">
              <feGaussianBlur stdDeviation="4" result="blur"/>
              <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
            </filter>
          </defs>
          <circle cx="200" cy="150" r="80" fill="url(#heroGrad1)" filter="url(#heroGlow)" class="hero-orbit"/>
          <circle cx="120" cy="100" r="30" fill="url(#heroGrad2)" filter="url(#heroGlow)" class="hero-float-1"/>
          <circle cx="300" cy="120" r="20" fill="url(#heroGrad1)" filter="url(#heroGlow)" class="hero-float-2"/>
          <circle cx="160" cy="200" r="15" fill="url(#heroGrad2)" filter="url(#heroGlow)" class="hero-float-3"/>
          <line x1="120" y1="100" x2="200" y2="150" stroke="#06d6a0" stroke-width="1.5" opacity="0.4" stroke-dasharray="4,4"/>
          <line x1="300" y1="120" x2="200" y2="150" stroke="#7b61ff" stroke-width="1.5" opacity="0.4" stroke-dasharray="4,4"/>
          <line x1="160" y1="200" x2="200" y2="150" stroke="#ff6b9d" stroke-width="1.5" opacity="0.4" stroke-dasharray="4,4"/>
          <g transform="translate(185,130)" class="hero-icon">
            <path d="M15,-25 L25,-8 L18,-8 L18,15 L12,15 L12,-8 L5,-8 Z" fill="white" opacity="0.9"/>
          </g>
          <g transform="translate(105,85)" class="hero-icon-small">
            <rect x="-8" y="-6" width="16" height="12" rx="2" fill="white" opacity="0.6"/>
          </g>
          <g transform="translate(285,108)" class="hero-icon-small">
            <rect x="-6" y="-8" width="12" height="16" rx="2" fill="white" opacity="0.6"/>
          </g>
        </svg>
      </div>
      <h1 class="hero-title gradient-text">Chaminda Drop</h1>
      <p class="hero-subtitle">Fast, secure peer-to-peer file sharing</p>
      <p class="hero-footer">Designed by Chaminda Gunasekara</p>
    </header>

    <section class="device-info glass-card animate-in">
      <div class="device-info-header">
        <span class="connected-status"><span class="status-dot"></span></span>
        <span class="device-label">Your Device</span>
      </div>
      <div class="device-name-row">
        <span id="deviceName" class="device-name">Detecting...</span>
        <button id="editDeviceName" class="btn-icon" aria-label="Edit device name">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
            <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
          </svg>
        </button>
      </div>
      <span id="devicePlatform" class="device-platform"></span>
    </section>

    <section class="room-section glass-card animate-in">
      <div class="room-actions">
        <button id="createRoom" class="btn-primary">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/>
          </svg>
          Create Room
        </button>
        <div class="room-join-group">
          <input id="roomCode" type="text" class="room-input glass-card" placeholder="Enter room code" maxlength="6" autocomplete="off" spellcheck="false">
          <button id="joinRoom" class="btn-secondary">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/>
            </svg>
            Join
          </button>
        </div>
      </div>
      <div id="roomInfo" class="room-info hidden">
        <span class="room-label">Room Code</span>
        <span id="currentRoom" class="room-code gradient-text"></span>
        <button id="showQR" class="btn-icon" aria-label="Show QR code">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="2" y="2" width="8" height="8" rx="1"/><rect x="14" y="2" width="8" height="8" rx="1"/><rect x="2" y="14" width="8" height="8" rx="1"/><rect x="14" y="14" width="4" height="4"/>
          </svg>
        </button>
        <button id="leaveRoom" class="btn-icon btn-danger" aria-label="Leave room">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/>
          </svg>
        </button>
      </div>
    </section>

    <section id="peersSection" class="peers-section hidden">
      <h2 class="section-title">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/>
        </svg>
        Connected Devices
      </h2>
      <div id="peers" class="peers-grid"></div>
    </section>

    <div id="dropZone" class="drop-zone">
      <div class="drop-zone-content">
        <div class="drop-icon">
          <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/>
          </svg>
        </div>
        <p class="drop-text">Drop files here to share</p>
        <p class="drop-subtext">Release to start sharing</p>
      </div>
    </div>

    <section id="transferPanel" class="transfer-panel glass-card hidden">
      <div class="transfer-header">
        <h3 class="transfer-title">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="16 3 21 3 21 8"/><line x1="4" y1="20" x2="21" y2="3"/><polyline points="21 16 21 21 16 21"/><line x1="15" y1="15" x2="21" y2="21"/><line x1="4" y1="4" x2="9" y2="9"/>
          </svg>
          Active Transfers
        </h3>
        <button id="closeTransferPanel" class="btn-icon" aria-label="Close transfers">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
      </div>
      <div id="transferList" class="transfer-list"></div>
    </section>

    <div id="toastContainer" class="toast-container"></div>
  </div>

  <div id="transferRequestModal" class="modal-overlay hidden">
    <div class="modal glass-card">
      <div class="modal-header">
        <h3 class="modal-title">Incoming Transfer</h3>
      </div>
      <div class="modal-body">
        <p id="transferSender" class="transfer-sender"></p>
        <div id="transferFileList" class="transfer-file-list"></div>
        <p id="transferTotalSize" class="transfer-total-size"></p>
      </div>
      <div class="modal-footer">
        <button id="rejectTransfer" class="btn-secondary btn-reject">Reject</button>
        <button id="acceptTransfer" class="btn-primary">Accept</button>
      </div>
    </div>
  </div>

  <div id="renameModal" class="modal-overlay hidden">
    <div class="modal glass-card">
      <div class="modal-header">
        <h3 class="modal-title">Rename Device</h3>
      </div>
      <div class="modal-body">
        <input id="newDeviceName" type="text" class="rename-input glass-card" placeholder="Enter new name" maxlength="24" autocomplete="off" spellcheck="false">
      </div>
      <div class="modal-footer">
        <button id="cancelRename" class="btn-secondary">Cancel</button>
        <button id="saveRename" class="btn-primary">Save</button>
      </div>
    </div>
  </div>

  <div id="qrModal" class="modal-overlay hidden">
    <div class="modal glass-card modal-qr">
      <div class="modal-header">
        <h3 class="modal-title">Scan to Join</h3>
        <button id="closeQR" class="btn-icon" aria-label="Close QR">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
      </div>
      <div class="modal-body qr-body">
        <canvas id="qrCanvas" width="256" height="256"></canvas>
        <p id="qrRoomCode" class="qr-code-text gradient-text"></p>
      </div>
    </div>
  </div>

  <input id="fileInput" type="file" multiple hidden>

  <script>
    if (location.hostname === 'localhost' || location.hostname === '127.0.0.1') {
      window.WS_SERVER = 'wss://file-sharing-backend-4jlt.onrender.com';
    }
  </script>
  <script src="/js/device.js"></script>
  <script src="/js/particles.js"></script>
  <script src="/js/hero.js"></script>
  <script src="/js/signaling.js"></script>
  <script src="/js/webrtc.js"></script>
  <script src="/js/transfer.js"></script>
  <script src="/js/qr.js"></script>
  <script src="/js/ui.js"></script>
  <script src="/js/app.js"></script>
</body>
</html>
